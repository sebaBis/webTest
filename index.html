<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCasa2</title>
    <!-- Import Material Symbols Outlined -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 10px;
      }
      button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 15px 30px; /* Aumentato il padding */
        font-size: 20px; /* Aumentato la dimensione del font */
        cursor: pointer;
        width: 300px; /* Aumentata la larghezza per accogliere icone e testo */
      }
      button .material-symbols-outlined {
        font-size: 40px; /* Icone decisamente più grandi */
      }
      #status {
        margin-top: 5px;
        color: green;
      }
      #authArea {
        margin-bottom: 30px;
        padding: 15px;
        border: 2px solid #333;
        border-radius: 8px;
        background-color: #f5f5f5;
        min-width: 350px;
      }
      #userDisplay {
        margin-bottom: 10px;
        font-size: 16px;
        font-weight: bold;
      }
      .auth-input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      #authButtons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      #authButtons button {
        flex: 1;
        min-width: 120px;
        padding: 10px;
        font-size: 14px;
      }
      #logoutBtn {
        display: none;
      }
      #loginBtn {
        background-color: #2196f3;
        color: white;
      }
      #controlsArea {
        display: none;
      }
      #controlsArea.authenticated {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .button-row {
        display: flex;
        gap: 10px;
        width: 300px;
      }
      .button-row button {
        flex: 1;
        width: auto;
        padding: 8px;
        font-size: 14px;
        gap: 8px;
      }
      .button-row button .material-symbols-outlined {
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <h1>iCasa2</h1>

    <div id="authArea">
      <div id="userDisplay">Non autenticato</div>
      <input
        type="email"
        id="emailInput"
        class="auth-input"
        placeholder="Email"
      />
      <input
        type="password"
        id="passwordInput"
        class="auth-input"
        placeholder="Password"
      />
      <div id="authButtons">
        <button id="loginBtn">Accedi</button>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="controlsArea">
      <!--h3>Firestore Database</h3>
      <button id="btn1">Invia "Alfa"</button-->

      <button id="rtdbA">
        <span class="material-symbols-outlined">door_front</span> Portina (A)
      </button>
      <button id="rtdbC">
        <span class="material-symbols-outlined">fence</span> Cancello (C)
      </button>
      <button id="rtdbG">
        <span class="material-symbols-outlined">garage</span> Garage (G)
        <span id="garageStatusIcon" class="material-symbols-outlined"
          >question_mark</span
        >
      </button>
      <div class="button-row">
        <button id="rtdbL_ON">
          <span class="material-symbols-outlined">lightbulb</span> LED ON (L)
        </button>
        <button id="rtdbL_OFF">
          <span class="material-symbols-outlined">light_off</span> LED OFF
        </button>
      </div>
    </div>

    <div id="status"></div>
    <button
      id="viewCmdBtn"
      style="
        display: none;
        width: auto;
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
        background-color: #607d8b;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        align-items: center;
        gap: 10px;
      "
    >
      Mostra Log Cmd
    </button>

    <button
      id="viewArduinoBtn"
      style="
        display: none;
        width: auto;
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
        background-color: #607d8b;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        align-items: center;
        gap: 10px;
        white-space: pre-line;
      "
    >
      Mostra Log Arduino
    </button>
    <button
      id="viewIoBtn"
      style="
        display: none;
        width: auto;
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
        background-color: #607d8b;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        align-items: center;
        gap: 10px;
      "
    >
      Mostra Log IO IO
    </button>

    <script type="module">
      // Importa le funzioni necessarie dall'SDK di Firebase (v10+)
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
      import {
        getDatabase,
        ref,
        push,
        set,
        onValue,
        query,
        limitToLast,
        serverTimestamp as rtdbTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB9cCJW834afmKTw9iMEl76EOiBPQ4fWs0",
        authDomain: "icasaserver.firebaseapp.com",
        databaseURL: "https://icasaserver-default-rtdb.firebaseio.com",
        projectId: "icasaserver",
        storageBucket: "icasaserver.firebasestorage.app",
        messagingSenderId: "317812359830",
        appId: "1:317812359830:web:00f46b3b10ea4fa2fcb8b7",
        measurementId: "G-NVTNVC2GRP",
      };

      // Inizializza Firebase
      const app = initializeApp(firebaseConfig);
      //const db = getFirestore(app);
      const rtdb = getDatabase(app);
      const auth = getAuth(app);

      const statusDiv = document.getElementById("status");
      const userDisplay = document.getElementById("userDisplay");
      const controlsArea = document.getElementById("controlsArea");
      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const viewCmdBtn = document.getElementById("viewCmdBtn");
      const viewArduinoBtn = document.getElementById("viewArduinoBtn");
      const viewIoBtn = document.getElementById("viewIoBtn");
      const garageStatusIcon = document.getElementById("garageStatusIcon");

      // Event listener for Realtime Database changes
      const lastRecordsQuery = query(ref(rtdb, "iCasa"), limitToLast(1));
      onValue(lastRecordsQuery, (snapshot) => {
        const records = [];
        snapshot.forEach((childSnapshot) => {
          const val = childSnapshot.val();
          records.push(val);
        });
        viewCmdBtn.textContent =
          records.length > 0
            ? records[0].cmd +
              " - " +
              (records[0].timestamp
                ? new Date(records[0].timestamp).toLocaleString("it-IT")
                : "N/A")
            : "";
        // all'arrivo dei dati ripristino il colore del pulsante
        viewCmdBtn.style.backgroundColor = "#607d8b";
      });

      const arduinoStatusQuery = query(
        ref(rtdb, "iCasaArduino"),
        limitToLast(2),
      );
      onValue(arduinoStatusQuery, (snapshot) => {
        const records = [];
        snapshot.forEach((childSnapshot) => {
          const val = childSnapshot.val();
          records.push(val);
        });
        // Formattiamo le ultime 2 righe (invertendo l'ordine per avere la più recente in alto)
        const lines = records
          //.reverse()
          .map(
            (r) =>
              (r.info || "") +
              " - " +
              (r.timestamp
                ? new Date(r.timestamp).toLocaleString("it-IT")
                : "N/A"),
          );

        viewArduinoBtn.textContent = lines.join("\n");
        viewArduinoBtn.style.backgroundColor = "#607d8b";
      });

      // Monitoraggio input (stato garage)
      const inputsQuery = query(ref(rtdb, "iCasaIO"), limitToLast(1));
      onValue(inputsQuery, (snapshot) => {
        snapshot.forEach((childSnapshot) => {
          const val = childSnapshot.val();
          // Logica per cambiare l'icona in base al feedback ricevuto I1=1 (garage chiuso) I2=1 (garage aperto)
          if (val.info.includes("i2=1")) {
            // portone aperto
            //garageStatusIcon.textContent = "lock_open_right";  // lucchetto bianco aperto
            garageStatusIcon.textContent = "garage_door_open"; // portone garage sollevato
          } else if (val.info.includes("i1=1")) {
            // portone chiuso
            //garageStatusIcon.textContent = "lock"; // lucchetto nero chiuso
            garageStatusIcon.textContent = "garage_door"; // portone garasce abbassato
          } else {
            // non e' ne' chiuso se aperto, metot punto interrogativo
            garageStatusIcon.textContent = "question_mark";
          }

          viewIoBtn.textContent =
            "IO: " +
            val.info +
            " - " +
            (val.timestamp
              ? new Date(val.timestamp).toLocaleString("it-IT")
              : "N/A");
          viewIoBtn.style.backgroundColor = "#607d8b";
        });
      });

      // Monitora lo stato di autenticazione
      onAuthStateChanged(auth, (user) => {
        if (user) {
          userDisplay.textContent = `Autenticato: ${user.email || user.uid.substring(0, 8) + "..."}`;
          emailInput.style.display = "none";
          passwordInput.style.display = "none";
          loginBtn.style.display = "none";
          logoutBtn.style.display = "inline-block";
          viewCmdBtn.style.display = "flex";
          viewArduinoBtn.style.display = "flex";
          viewIoBtn.style.display = "flex";
          controlsArea.classList.add("authenticated");
          console.log("Utente autenticato:", user.email || user.uid);
        } else {
          userDisplay.textContent = "Non autenticato";
          emailInput.style.display = "block";
          passwordInput.style.display = "block";
          loginBtn.style.display = "inline-block";
          logoutBtn.style.display = "none";
          viewCmdBtn.style.display = "none";
          viewArduinoBtn.style.display = "none";
          viewIoBtn.style.display = "none";
          controlsArea.classList.remove("authenticated");
          statusDiv.textContent = "";
          console.log("Utente non autenticato");
        }
      });

      viewCmdBtn.addEventListener("click", () => {
        window.location.href = "cmds.html";
      });

      // Listener per l'apertura della pagina dei log
      viewArduinoBtn.addEventListener("click", () => {
        window.location.href = "logs.html";
      });

      viewIoBtn.addEventListener("click", () => {
        window.location.href = "io.html";
      });

      // Gestore del login
      loginBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          statusDiv.textContent = "Inserisci email e password.";
          return;
        }

        try {
          statusDiv.textContent = "Accesso in corso...";
          await signInWithEmailAndPassword(auth, email, password);
          statusDiv.textContent = "Accesso effettuato!";
          emailInput.value = "";
          passwordInput.value = "";
        } catch (error) {
          statusDiv.textContent = "Errore accesso: " + error.message;
          console.error("Errore login:", error);
        }
      });

      // Gestore del logout
      logoutBtn.addEventListener("click", async () => {
        try {
          statusDiv.textContent = "Disconnessione...";
          await signOut(auth);
          statusDiv.textContent = "Disconnesso.";
        } catch (error) {
          statusDiv.textContent = "Errore: " + error.message;
          console.error("Errore logout:", error);
        }
      });

      // Genera un ID client univoco in formato esadecimale
      function createClientId() {
        const array = new Uint8Array(16);
        crypto.getRandomValues(array);
        return Array.from(array, (byte) =>
          byte.toString(16).padStart(2, "0"),
        ).join("");
      }

      function getClientId() {
        let clientId = localStorage.getItem("clientId");
        if (!clientId) {
          clientId = createClientId();
          localStorage.setItem("clientId", clientId);
        }
        return clientId;
      }

      const clientId = getClientId();
      console.log("Client ID:", clientId);

      // Funzione per salvare i dati nel database
      //   async function salvaStringa(valore) {
      //     statusDiv.textContent = "Invio in corso...";
      //     try {
      //       // Aggiunge un nuovo documento alla collezione "messaggi"
      //       const docRef = await addDoc(collection(db, "messaggi"), {
      //         testo: valore,
      //         data_invio: serverTimestamp(),
      //       });
      //       statusDiv.textContent = `Successo! ID: ${docRef.id}`;
      //       console.log("Documento scritto con ID: ", docRef.id);
      //     } catch (e) {
      //       statusDiv.textContent = "Errore durante l'invio.";
      //       console.error("Errore: ", e);
      //     }
      //   }

      // Funzione per salvare i dati nel Realtime Database
      async function salvaSuRealtime(valore) {
        if (!auth.currentUser) {
          statusDiv.textContent = "Errore: devi autenticarti prima.";
          return;
        }
        statusDiv.textContent = "Invio a Realtime DB...";
        // metot tutti i pulsanti a colore grigio cosi da evidenziare quando arriveranno i dati
        viewCmdBtn.style.backgroundColor = "lightgray";
        viewArduinoBtn.style.backgroundColor = "lightgray";
        viewIoBtn.style.backgroundColor = "lightgray";
        try {
          // Crea un nuovo riferimento con ID univoco (simile a addDoc)
          const messaggiRef = ref(rtdb, "iCasa");
          const nuovoMessaggioRef = push(messaggiRef);

          await set(nuovoMessaggioRef, {
            cmd: valore,
            userId: auth.currentUser.uid,
            clientId: getClientId(),
            timestamp: rtdbTimestamp(),
          });
          statusDiv.textContent = `Realtime OK! ID: ${nuovoMessaggioRef.key}`;
        } catch (e) {
          statusDiv.textContent = "Errore Realtime DB.";
          console.error("Errore Realtime: ", e);
        }
      }

      // Associa gli eventi ai pulsanti
      document
        .getElementById("rtdbA")
        .addEventListener("click", () => salvaSuRealtime("A"));
      document
        .getElementById("rtdbC")
        .addEventListener("click", () => salvaSuRealtime("C"));
      document
        .getElementById("rtdbG")
        .addEventListener("click", () => salvaSuRealtime("G"));
      document
        .getElementById("rtdbL_ON")
        .addEventListener("click", () => salvaSuRealtime("L"));
      document
        .getElementById("rtdbL_OFF")
        .addEventListener("click", () => salvaSuRealtime("L1s"));
    </script>
  </body>
</html>
